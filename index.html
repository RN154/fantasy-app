<!DOCTYPE html>
<html>
<head>
  <title>Fantasy Team Builder</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    h2 { margin-top: 30px; }
    .player { padding: 5px; cursor: pointer; }
    .selected { background-color: lightgreen; }
  </style>
</head>

<body>

<h1>Fantasy Team Builder</h1>
<p>Selected Players: <span id="count">0</span>/11</p>

<div id="players"></div>

<script>

// ================= CONFIG =================
const TeamA = "MI";
const TeamB = "RCB";

// Replace with your Google Sheet CSV link
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnVsV7RRdVqL-HrZNeHVfZqdhdONQIuDgAoYOQ3uhSElmLmH75Rde_K9o0vdQ__f2Pm0J9d42CTzC8/pub?gid=0&single=true&output=csv";

// ==========================================

let selectedPlayers = [];
let captain = null;
let viceCaptain = null;

// Fetch data
fetch(sheetURL)
.then(res => res.text())
.then(data => {
  const rows = data.split("\n").slice(1);
  const players = rows.map(r => {
    const [Player, Team, Role, Points] = r.split(",");
    return { Player, Team, Role, Points: Number(Points) };
  });

  // Filter match teams
  const filtered = players.filter(p => p.Team === TeamA || p.Team === TeamB);

  renderPlayers(filtered);
});

// Group by role
function renderPlayers(players) {
  const container = document.getElementById("players");

  const roles = {
    "Wicketkeeper": [],
    "Batsman": [],
    "Allrounder": [],
    "Bowler": []
  };

  players.forEach(p => roles[p.Role]?.push(p));

  for (let role in roles) {
    const section = document.createElement("div");
    section.innerHTML = `<h2>${role}</h2>`;

    roles[role].forEach(p => {
      const div = document.createElement("div");
      div.className = "player";
      div.innerText = `${p.Player} (${p.Team}) - ${p.Points} pts`;

      div.onclick = () => togglePlayer(p, div);

      section.appendChild(div);
    });

    container.appendChild(section);
  }
}

// Selection logic
function togglePlayer(player, element) {

  const exists = selectedPlayers.find(p => p.Player === player.Player);

  if (exists) {
    selectedPlayers = selectedPlayers.filter(p => p.Player !== player.Player);
    element.classList.remove("selected");
  } else {
    if (selectedPlayers.length >= 11) {
      alert("Max 11 players allowed");
      return;
    }

    const teamCount = selectedPlayers.filter(p => p.Team === player.Team).length;
    if (teamCount >= 8) {
      alert("Max 8 players from one team");
      return;
    }

    selectedPlayers.push(player);
    element.classList.add("selected");
  }

  document.getElementById("count").innerText = selectedPlayers.length;
}

</script>

</body>
</html>
